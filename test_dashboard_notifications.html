<!DOCTYPE html>
<html>
<head>
    <title>Test Dashboard Notifications</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .user-section { border: 1px solid #ccc; margin: 10px 0; padding: 15px; }
        .notification { background: #f0f8ff; padding: 10px; margin: 5px 0; border-left: 4px solid #007bff; }
        .high { border-left-color: #dc3545; background: #fff5f5; }
        .critical { border-left-color: #dc3545; background: #ffe6e6; }
        .medium { border-left-color: #ffc107; background: #fffbf0; }
        .btn { background: #007bff; color: white; padding: 8px 16px; border: none; cursor: pointer; margin: 5px; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>🔔 Dashboard Notification Test</h1>
    
    <div class="user-section">
        <h2>Test as Superadmin (User ID 1)</h2>
        <button class="btn" onclick="testNotifications(1, 'superadmin')">Test Superadmin Notifications</button>
        <div id="superadmin-results"></div>
    </div>
    
    <div class="user-section">
        <h2>Test as David_Ops (User ID 12)</h2>
        <button class="btn" onclick="testNotifications(12, 'david_ops')">Test David_Ops Notifications</button>
        <div id="david_ops-results"></div>
    </div>
    
    <script>
        function testNotifications(userId, username) {
            const resultDiv = document.getElementById(username + '-results');
            resultDiv.innerHTML = '<p>🔄 Testing notifications...</p>';
            
            fetch('/api/get_pending_assignments', {
                method: 'GET',
                credentials: 'include'
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                let html = '<h3>✅ API Response Successful</h3>';
                
                if (data.success && data.assignments && data.assignments.length > 0) {
                    html += `<p>Found ${data.assignments.length} pending assignments:</p>`;
                    
                    data.assignments.forEach(assignment => {
                        const priorityClass = assignment.incident_priority.toLowerCase();
                        html += `
                            <div class="notification ${priorityClass}">
                                <h4>${assignment.incident_title}</h4>
                                <p><strong>ID:</strong> ${assignment.incident_id}</p>
                                <p><strong>Priority:</strong> ${assignment.incident_priority}</p>
                                <p><strong>Description:</strong> ${assignment.incident_description}</p>
                                <p><strong>Context:</strong> ${assignment.handover_context}</p>
                                <p><strong>Assigned By:</strong> ${assignment.assigned_by}</p>
                            </div>
                        `;
                    });
                } else {
                    html += '<p>❌ No pending assignments found</p>';
                }
                
                resultDiv.innerHTML = html;
            })
            .catch(error => {
                resultDiv.innerHTML = `<p>❌ Error: ${error.message}</p><p>Make sure you're logged in as ${username}</p>`;
            });
        }
    </script>
</body>
</html>
