# Shift Handover Application - Production Docker Compose
# This file uses Docker secrets for secure credential management
# Works for both local development and production deployment


services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: shifthandover
      MYSQL_USER: user
      # Passwords loaded from Docker secrets
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
    
    secrets:
      - mysql_password
      - mysql_root_password
    
    ports:
      - "3306:3306"
    
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init_local.sql:/docker-entrypoint-initdb.d/init_local.sql:ro
    
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      start_period: 30s
    
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --max-connections=200
      --thread-cache-size=16
      --table-open-cache=2000
      --tmp-table-size=64M
      --max-heap-table-size=64M
      --join-buffer-size=256K
      --sort-buffer-size=256K
      --read-buffer-size=256K
      --read-rnd-buffer-size=512K
      --slow-query-log=1
      --long-query-time=2
      --log-queries-not-using-indexes=0
    
    # Security settings for production
    security_opt:
      - no-new-privileges:true

  # Shift Handover Web Application
  web:
    build: .
    restart: unless-stopped
    command: bash start.sh
    
    volumes:
      - .:/app
      - app_logs:/app/logs
      - uploads_data:/app/uploads
    
    ports:
      - "5000:5000"
    
    environment:
      # Flask Configuration
      FLASK_ENV: production
      FLASK_APP: app.py
      FLASK_DEBUG: 0
      
      # Database Configuration (uses Docker secrets)
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      DATABASE_NAME: shifthandover
      DATABASE_USER: user
      
      # Core application secrets loaded from Docker secrets:
      # - SECRET_KEY from /run/secrets/flask_secret_key
      # - SSO_ENCRYPTION_KEY from /run/secrets/sso_encryption_key  
      # - SECRETS_MASTER_KEY from /run/secrets/secrets_master_key
      
      # Email Configuration — override via .env or environment to switch providers
      SMTP_SERVER: ${MAIL_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${MAIL_PORT:-587}
      
      # Force use of database configuration for app settings
      USE_DATABASE_CONFIG: "true"

      # Celery broker / backend for scheduler status queries (REQ-004/REQ-013)
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      
    secrets:
      - flask_secret_key
      - database_url
      - sso_encryption_key
      - secrets_master_key
      - smtp_username
      - smtp_password
      - mysql_user_password
    
    depends_on:
      - db
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Security settings for production
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build: .
    restart: unless-stopped
    # REQ-003: all background job execution delegated exclusively to Celery.
    # celery_app.py reads CELERY_BROKER_URL / CELERY_RESULT_BACKEND from env.
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FLASK_ENV: production
    secrets:
      - flask_secret_key
      - database_url
      - sso_encryption_key
      - secrets_master_key
      - smtp_username
      - smtp_password
      - mysql_user_password
    depends_on:
      - db
      - redis
    security_opt:
      - no-new-privileges:true

  celery-beat:
    build: .
    restart: unless-stopped
    # REQ-005: Beat runs as a single process — each job executes exactly once
    # per interval regardless of HTTP worker count (native deduplication).
    command: celery -A celery_app beat --loglevel=info --schedule=/var/celery/celerybeat-schedule
    volumes:
      - celerybeat_data:/var/celery
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FLASK_ENV: production
    secrets:
      - flask_secret_key
      - database_url
      - sso_encryption_key
      - secrets_master_key
      - mysql_user_password
    depends_on:
      - redis
    security_opt:
      - no-new-privileges:true

# Docker Secrets Configuration
# These secrets must be created before deployment
# For local development: files in ./secrets/ directory
# For production: external Docker secrets or Docker Swarm secrets
secrets:
  flask_secret_key:
    file: ./secrets/flask_secret_key
  
  database_url:
    file: ./secrets/database_url
  
  sso_encryption_key:
    file: ./secrets/sso_encryption_key
  
  secrets_master_key:
    file: ./secrets/secrets_master_key
  
  mysql_password:
    file: ./secrets/mysql_password
  
  mysql_root_password:
    file: ./secrets/mysql_root_password
  
  mysql_user_password:
    file: ./secrets/mysql_user_password
  
  smtp_username:
    file: ./secrets/smtp_username
  
  smtp_password:
    file: ./secrets/smtp_password

# Persistent Storage Volumes
volumes:
  mysql_data:
    driver: local
  app_logs:
    driver: local
  uploads_data:
    driver: local
  celerybeat_data:
    driver: local
