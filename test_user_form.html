<!DOCTYPE html>
<html>
<head>
    <title>User Management Test Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Test Add User Form</h2>
    
    <!-- Simple test form -->
    <div class="card">
        <div class="card-body">
            <form method="post" action="/user-management" id="testUserForm">
                <input type="hidden" name="action" value="add">
                
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" id="username" required>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" id="password" required>
                </div>
                
                <div class="mb-3">
                    <label for="role" class="form-label">Role</label>
                    <select name="role" class="form-select" id="role" required>
                        <option value="">Select Role</option>
                        <option value="user">User</option>
                        <option value="team_admin">Team Admin</option>
                        <option value="account_admin">Account Admin</option>
                        <option value="super_admin">Super Admin</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="account_id" class="form-label">Account ID</label>
                    <input type="number" name="account_id" class="form-control" id="account_id" value="1" required>
                    <small class="form-text text-muted">Enter 1 for default account</small>
                </div>
                
                <div class="mb-3">
                    <label for="first_name" class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" id="first_name">
                </div>
                
                <div class="mb-3">
                    <label for="last_name" class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" id="last_name">
                </div>
                
                <button type="submit" class="btn btn-primary" id="submitBtn">Add User</button>
                <button type="button" class="btn btn-secondary" onclick="testFormData()">Test Form Data</button>
            </form>
        </div>
    </div>
    
    <!-- Debug information -->
    <div class="card mt-4">
        <div class="card-body">
            <h5>Debug Information</h5>
            <div id="debugInfo"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Debug form data
function testFormData() {
    const form = document.getElementById('testUserForm');
    const formData = new FormData(form);
    const debugDiv = document.getElementById('debugInfo');
    
    let output = '<h6>Form Data:</h6><ul>';
    for (let [key, value] of formData.entries()) {
        output += `<li><strong>${key}:</strong> ${value}</li>`;
    }
    output += '</ul>';
    
    debugDiv.innerHTML = output;
}

// Add form submission logging
document.getElementById('testUserForm').addEventListener('submit', function(e) {
    console.log('Form submitted');
    const formData = new FormData(this);
    console.log('Form data:', Object.fromEntries(formData));
    
    // Optional: Prevent submission for testing
    // e.preventDefault();
    // alert('Form would be submitted with data: ' + JSON.stringify(Object.fromEntries(formData)));
});

// Log when page loads
console.log('Test form page loaded');
</script>
</body>
</html>
