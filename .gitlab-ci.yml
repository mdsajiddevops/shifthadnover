stages:
  - install
  - lint
  - test
  - deploy

default:
  image: python:3.11-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS == null

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  DATABASE_URL: "sqlite:///ci_test.db"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .venv/
    - .pip-cache/

install:
  stage: install
  script:
    - python -m venv .venv
    - .venv/bin/pip install --upgrade pip
    - .venv/bin/pip install -r requirements.txt
    - .venv/bin/pip install ruff==0.4.4
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour

lint:
  stage: lint
  script:
    - .venv/bin/ruff check . --max-line-length 120 --ignore E501,W503,E402 --exclude migrations/

test:
  stage: test
  script:
    - .venv/bin/python -c "import flask; import app; print('Import OK')"
  variables:
    DATABASE_URL: "sqlite:///ci_test.db"
    SECRET_KEY: "ci-test-secret"
    FLASK_ENV: "testing"

deploy:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $DEPLOY_USER@$DEPLOY_HOST "cd /app && git pull origin master && docker-compose -f docker-compose.prod.yml up -d --build"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: manual
  environment:
    name: production
