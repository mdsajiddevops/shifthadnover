
  workflow:
    rules:
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS == null

  default:
    image: python:3.11-slim

  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
    DATABASE_URL: "sqlite:///ci_test.db"

  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .venv/
      - .pip-cache/

  install:
    stage: install
    script:
      - python -m venv .venv
      - .venv/bin/pip install --upgrade pip
      - .venv/bin/pip install -r requirements.txt
      - .venv/bin/pip install ruff==0.4.4
    artifacts:
      paths:
        - .venv/
      expire_in: 1 hour

  lint:
    stage: lint
    script:
      - .venv/bin/ruff check . --max-line-length 120 --ignore E501,W503,E402

  test:
    stage: test
    variables:
      DATABASE_URL: sqlite:///ci_test.db
      SECRET_KEY: ci-test-secret
      FLASK_ENV: testing
    script:
      - .venv/bin/python -c "import flask; print('Flask OK')"

  deploy:
    stage: deploy
    image: alpine:3.19
    script:
      - echo "Deploy step - configure DEPLOY_SSH_KEY, DEPLOY_HOST, DEPLOY_USER in CI/CD variables"
    rules:
      - if: $CI_COMMIT_BRANCH == "master"
        when: manual
    environment:
      name: production

  stages:
    - install
    - lint
    - test
    - deploy