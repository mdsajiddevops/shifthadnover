stages:
  - install
  - lint
  - test
  - build

default:
  image: python:3.11-slim
  before_script:
    - pip install --quiet --upgrade pip
    - pip install --quiet -r requirements.txt
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS == null

install:
  stage: install
  script:
    - pip install --quiet -r requirements.txt
    - python -c "import flask; print('Flask', flask.__version__)"
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .pip-cache/

lint:
  stage: lint
  before_script:
    - pip install --quiet ruff
  script:
    - ruff check . --select E,F,W --ignore E501 --exclude migrations/,migration/,archive/,mockups/
  allow_failure: true

test:
  stage: test
  variables:
    LOCAL_DEVELOPMENT: "true"
    DATABASE_URL: "sqlite:///test_shifthandover.db"
    FLASK_SECRET_KEY: "ci-test-secret-key"
    SECRETS_MASTER_KEY: "ci-test-master-key-32chars-padding"
    SSO_ENCRYPTION_KEY: "ci-test-sso-encryption-key-32chr"
  script:
    - pip install --quiet pytest
    - python -c "from app import create_app; app = create_app(); print('App factory OK')"
  after_script:
    - rm -f test_shifthandover.db

build:
  stage: build
  script:
    - docker build -t shifthandover:$CI_COMMIT_SHORT_SHA .
  only:
    - main
    - master
    - develop
  tags:
    - docker
