include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS == null

default:
  image: python:3.11-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  DATABASE_URL: "sqlite:///ci_test.db"
  SAST_EXCLUDED_PATHS: "spec,test,tests,tmp,node_modules,.venv,migrations"
  SECRET_DETECTION_EXCLUDED_PATHS: "tests,.venv"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .venv/
    - .pip-cache/

stages:
  - install
  - lint
  - test
  - regression-tests
  - security
  - build
  - deploy-staging
  - deploy

install:
  stage: install
  script:
    - python -m venv .venv
    - .venv/bin/pip install --upgrade pip
    - .venv/bin/pip install -r requirements.txt
    - .venv/bin/pip install ruff==0.4.4
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour

lint:
  stage: lint
  script:
    - .venv/bin/ruff check . --line-length 120
    - .venv/bin/ruff format --check .

unit-test:
  stage: test
  variables:
    LOCAL_DEVELOPMENT: "true"
    DATABASE_URL: sqlite:///ci_test.db
    FLASK_SECRET_KEY: ci-test-secret-key
    SECRETS_MASTER_KEY: ci-test-master-key-32chars-padding
    SSO_ENCRYPTION_KEY: ci-test-sso-encryption-key-32chr
  script:
    - .venv/bin/pytest tests/ -v --tb=short
        --ignore=tests/test_application.py
        --ignore=tests/test_user_activities.py
        --ignore=tests/test_admin_activities.py
        --ignore=tests/test_handover_workflow.py
        --ignore=tests/test_change_info.py

integration-test:
  stage: test
  services:
    - name: mysql:8.0
      alias: mysql
      variables:
        MYSQL_ROOT_PASSWORD: testroot
        MYSQL_DATABASE: shifthandover_test
        MYSQL_USER: testuser
        MYSQL_PASSWORD: testpass
  variables:
    DATABASE_URL: "mysql+pymysql://testuser:testpass@mysql/shifthandover_test"
    FLASK_SECRET_KEY: ci-test-secret-key
    SECRETS_MASTER_KEY: "ci-test-master-key-32chars-pad!"
    SSO_ENCRYPTION_KEY: "ci-test-sso-key-32characters!!"
    FLASK_ENV: testing
    CELERY_BROKER_URL: "memory://"
    CELERY_RESULT_BACKEND: "cache+memory://"
    TEST_BASE_URL: "http://localhost:5000"
    TEST_SUPERADMIN_USER: "superadmin"
    TEST_SUPERADMIN_PASSWORD: "admin123"
    TEST_USER: "ctctestuser"
    TEST_USER_PASSWORD: "test123"
  script:
    - apt-get install -qq -y default-mysql-client
    - until mysqladmin ping -h mysql -u root -ptestroot --silent 2>/dev/null; do echo "Waiting for MySQL..."; sleep 3; done
    - .venv/bin/flask db upgrade
    - |
      .venv/bin/python - <<'EOF'
      from app import create_app
      from models.models import db, User, Account, Team
      from werkzeug.security import generate_password_hash
      import secrets
      app = create_app()
      with app.app_context():
          db.create_all()
          if not Account.query.first():
              acc = Account(name='Test Account', is_active=True)
              db.session.add(acc)
              db.session.flush()
              team = Team(name='Test Team', account_id=acc.id, is_active=True)
              db.session.add(team)
              db.session.flush()
              admin = User(username='superadmin',
                           password_hash=generate_password_hash('admin123'),
                           role='super_admin', is_active=True,
                           session_token=secrets.token_hex(32))
              db.session.add(admin)
              db.session.flush()
              regular = User(username='ctctestuser',
                             password_hash=generate_password_hash('test123'),
                             role='user', is_active=True,
                             account_id=acc.id, team_id=team.id,
                             onboarding_completed=True,
                             session_token=secrets.token_hex(32))
              db.session.add(regular)
              db.session.commit()
              print('Seeded.')
      EOF
    - .venv/bin/python app.py &
    - APP_PID=$!
    - sleep 8
    - curl -sf http://localhost:5000/health || (kill $APP_PID; exit 1)
    - .venv/bin/python tests/run_tests.py --url http://localhost:5000 --user superadmin --password admin123 --verbose
    - .venv/bin/pytest tests/test_application.py -v --tb=short
    - .venv/bin/pytest tests/regression/ -v --tb=short
    - kill $APP_PID || true

# Smoke test — import check + /health endpoint against SQLite
smoke-test:
  stage: test
  variables:
    LOCAL_DEVELOPMENT: "true"
    DATABASE_URL: sqlite:///ci_test.db
    SECRET_KEY: ci-test-secret
    FLASK_ENV: testing
  script:
    - .venv/bin/python -c "import app; print('App imports OK')"
    - .venv/bin/python app.py &
    - APP_PID=$!
    - sleep 5
    - .venv/bin/python -c "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')" && echo "Health check passed"
    - kill $APP_PID || true

# --- CTCOAMSHM-115: REQ-004 — Exact dependency pin enforcement ---
pin-lint:
  stage: regression-tests
  script:
    - python scripts/validate_pins.py
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  allow_failure: false

# --- CTCOAMSHM-115: REQ-005 — Production compose must have no /app bind-mount ---
compose-lint:
  stage: regression-tests
  script:
    - docker compose -f docker-compose.yml -f docker-compose.prod.yml config |
      python3 -c "
import sys
cfg = sys.stdin.read()
# Named volumes like 'app_logs:/app/logs' are acceptable; host bind-mounts are not.
# A host bind-mount appears as a relative or absolute path before the colon.
import re
host_mounts = re.findall(r'^\s+-\s+(?:\./|/)[^:]+:/app\b', cfg, re.MULTILINE)
if host_mounts:
    print('FAIL: host bind-mount to /app found in prod config:')
    for m in host_mounts:
        print(' ', m.strip())
    sys.exit(1)
print('OK: no host bind-mount to /app in prod config')
"
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  allow_failure: false

# --- CTCOAMSHM-115: REQ-006 — Full regression test suite as a mandatory blocking stage ---
regression-tests:
  stage: regression-tests
  services:
    - name: mysql:8.0
      alias: mysql
      variables:
        MYSQL_ROOT_PASSWORD: testroot
        MYSQL_DATABASE: shifthandover_test
        MYSQL_USER: testuser
        MYSQL_PASSWORD: testpass
  variables:
    DATABASE_URL: "mysql+pymysql://testuser:testpass@mysql/shifthandover_test"
    FLASK_SECRET_KEY: ci-test-secret-key
    SECRETS_MASTER_KEY: "ci-test-master-key-32chars-pad!"
    SSO_ENCRYPTION_KEY: "ci-test-sso-key-32characters!!"
    FLASK_ENV: testing
    CELERY_BROKER_URL: "memory://"
    CELERY_RESULT_BACKEND: "cache+memory://"
  script:
    - apt-get install -qq -y default-mysql-client
    - until mysqladmin ping -h mysql -u root -ptestroot --silent 2>/dev/null; do sleep 3; done
    - .venv/bin/flask db upgrade
    - .venv/bin/pytest tests/regression/ -v --tb=short
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  allow_failure: false

# Dependency CVE scan — blocking merge gate (REQ-008 / T-006)
dependency-scan:
  stage: security
  script:
    - .venv/bin/pip install -r requirements-ci.txt
    - .venv/bin/pip-audit --requirement requirements.txt --format json --output pip-audit-report.json || true
    - .venv/bin/pip-audit --requirement requirements.txt
  artifacts:
    when: always
    paths:
      - pip-audit-report.json
    expire_in: 7 days
  allow_failure: false

# Python SAST via Bandit — advisory (REQ-008 / T-006)
sast-bandit:
  stage: security
  script:
    - .venv/bin/pip install -r requirements-ci.txt
    - .venv/bin/bandit -r . -x tests/,.venv/,migrations/ -f json -o bandit-report.json || true
    - .venv/bin/bandit -r . -x tests/,.venv/,migrations/
  artifacts:
    when: always
    paths:
      - bandit-report.json
    expire_in: 7 days
  allow_failure: true

# GitLab SAST — static analysis for Python (Bandit-based, free on all tiers)
sast:
  stage: security

# GitLab Secret Detection — scans for committed secrets in git history
secret_detection:
  stage: security

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

deploy-staging:
  stage: deploy-staging
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$STAGING_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$STAGING_USER@$STAGING_HOST" bash -s << ENDSSH
        set -e
        cd /opt/shifthandover-staging
        git pull origin develop
        echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
        docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        docker tag  $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:staging-latest
        APP_IMAGE=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
          docker-compose -f docker-compose.prod.yml up -d
        docker system prune -f --volumes=false
      ENDSSH
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: on_success
  environment:
    name: staging
    url: https://$STAGING_DOMAIN

deploy:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" bash -s << ENDSSH
        set -e
        cd /opt/shifthandover

        # 1. Pull latest infra files (compose, migrations, secrets structure)
        git pull origin master

        # 2. Login to GitLab registry and pull the CI-built image
        echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
        docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        docker tag  $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest

        # 3. Ensure DB container is running before migration
        docker-compose -f docker-compose.prod.yml up -d db
        echo "Waiting for DB to be ready..."
        until docker-compose -f docker-compose.prod.yml exec -T db \
          mysqladmin ping -u root -p"\$(cat ./secrets/mysql_root_password)" --silent 2>/dev/null; do
          sleep 3
        done

        # 4. Run idempotent schema sync
        docker-compose -f docker-compose.prod.yml exec -T db \
          mysql -u root -p"\$(cat ./secrets/mysql_root_password)" shift_handover \
          < scripts/migrations/prod_schema_sync.sql
        echo "Schema sync complete."

        # 5. Start with the pre-built registry image — no rebuild
        APP_IMAGE=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
          docker-compose -f docker-compose.prod.yml up -d

        # 6. Prune dangling images (keep volumes intact)
        docker system prune -f --volumes=false
      ENDSSH
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: manual
  environment:
    name: production
    url: https://$APP_DOMAIN
