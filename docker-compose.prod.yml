# Production Docker Compose for GCP VM deployment
version: '3.7'

secrets:
  mysql_password:
    file: ./secrets/mysql_password
  mysql_root_password:
    file: ./secrets/mysql_root_password
  mysql_user_password:
    file: ./secrets/mysql_user_password
  database_url:
    file: ./secrets/database_url
  flask_secret_key:
    file: ./secrets/flask_secret_key

services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    restart: unless-stopped
    secrets:
      - mysql_password
      - mysql_root_password
    environment:
      MYSQL_DATABASE: shift_handover
      MYSQL_USER: user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations/init_local.sql:/docker-entrypoint-initdb.d/init_local.sql:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 30s

    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=1G
      --innodb-log-file-size=256M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --max-connections=200
      --thread-cache-size=16
      --table-open-cache=2000
      --tmp-table-size=64M
      --max-heap-table-size=64M
      --join-buffer-size=256K
      --sort-buffer-size=256K
      --read-buffer-size=256K
      --read-rnd-buffer-size=512K
      --slow-query-log=1
      --long-query-time=2
      --log-queries-not-using-indexes=0

  # Shift Handover Web Application
  web:
    image: ${APP_IMAGE:-shifthandover-web:latest}
    build: .
    restart: unless-stopped
    command: bash start.sh
    secrets:
      - mysql_user_password
      - database_url
      - flask_secret_key

    volumes:
      - app_logs:/app/logs

    ports:
      - "5000:5000"

    environment:
      FLASK_ENV: production
      FLASK_APP: app.py
      FLASK_DEBUG: 0

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      timeout: 10s
      retries: 3
      interval: 30s

volumes:
  mysql_data:
    driver: local
  app_logs:
    driver: local
