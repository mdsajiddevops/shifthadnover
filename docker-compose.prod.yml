# Production Docker Compose for GCP VM deployment
version: '3.7'

services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: shift_handover
      MYSQL_USER: user
      MYSQL_PASSWORD: securepassword123
      MYSQL_ROOT_PASSWORD: rootsecurepassword123
    
    ports:
      - "3306:3306"
    
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations/init_local.sql:/docker-entrypoint-initdb.d/init_local.sql:ro
    
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 30s

  # Shift Handover Web Application
  web:
    build: .
    restart: unless-stopped
    command: python app.py
    
    volumes:
      - .:/app
      - app_logs:/app/logs
    
    ports:
      - "5000:5000"  # Map to port 5000 for web access
    
    environment:
      FLASK_ENV: production
      FLASK_APP: app.py
      FLASK_DEBUG: 0
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      DATABASE_NAME: shift_handover
      DATABASE_USER: root
      DATABASE_PASSWORD: rootsecurepassword123
      SECRET_KEY: your-secret-key-here
    
    depends_on:
      db:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      timeout: 10s
      retries: 3
      interval: 30s

volumes:
  mysql_data:
    driver: local
  app_logs:
    driver: local