name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff==0.4.4
      - name: Run ruff (blocking)
        run: ruff check . --line-length 120 --exclude migrations/,migration/,archive/,mockups/

  unit-test:
    name: Unit tests (no live app required)
    runs-on: ubuntu-latest
    env:
      LOCAL_DEVELOPMENT: "true"
      DATABASE_URL: "sqlite:///ci_test.db"
      FLASK_SECRET_KEY: "ci-test-secret-key"
      SECRETS_MASTER_KEY: "ci-test-master-key-32chars-padding"
      SSO_ENCRYPTION_KEY: "ci-test-sso-encryption-key-32chr"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: |
          pytest tests/test_startup_checks.py \
                 tests/test_celery_app.py \
                 tests/test_validators.py \
                 tests/test_rbac_errors.py \
                 tests/test_audit_service.py \
                 -v --tb=short 2>/dev/null || \
          pytest tests/test_startup_checks.py tests/test_validators.py -v --tb=short

  smoke-test:
    name: App factory smoke test
    runs-on: ubuntu-latest
    env:
      LOCAL_DEVELOPMENT: "true"
      DATABASE_URL: "sqlite:///test_shifthandover.db"
      FLASK_SECRET_KEY: "ci-test-secret-key"
      SECRETS_MASTER_KEY: "ci-test-master-key-32chars-padding"
      SSO_ENCRYPTION_KEY: "ci-test-sso-encryption-key-32chr"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: App factory smoke test
        run: python -c "from app import create_app; app = create_app(); print('OK')"

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install pip-audit bandit
      - name: Dependency CVE scan
        run: pip-audit --requirement requirements.txt
      - name: Bandit SAST (report all)
        run: bandit -r . -x tests/,migrations/,archive/ --severity-level medium -f json -o bandit-report.json || true
      - name: Bandit SAST (block on high severity)
        run: bandit -r . -x tests/,migrations/,archive/ --severity-level high
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

  secret-detection:
    name: Secret detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, unit-test, smoke-test, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t shifthandover:${{ github.sha }} .
      - name: Log in to GitHub Container Registry
        if: ${{ env.GHCR_PUSH == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        if: ${{ env.GHCR_PUSH == 'true' }}
        run: |
          docker tag shifthandover:${{ github.sha }} ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker tag shifthandover:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [lint, unit-test, smoke-test, security]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/shifthandover-staging
            git pull origin develop
            docker-compose -f docker-compose.prod.yml up -d --build
            docker system prune -f --volumes=false
        continue-on-error: true
