name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff==0.4.4
      - name: Run ruff (blocking)
        run: ruff check . --line-length 120 --exclude migrations/,migration/,archive/,mockups/

  unit-test:
    name: Unit tests (no live app required)
    runs-on: ubuntu-latest
    env:
      LOCAL_DEVELOPMENT: "true"
      DATABASE_URL: "sqlite:///ci_test.db"
      FLASK_SECRET_KEY: "ci-test-secret-key"
      SECRETS_MASTER_KEY: "ci-test-master-key-32chars-padding"
      SSO_ENCRYPTION_KEY: "ci-test-sso-encryption-key-32chr"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: |
          pytest tests/test_startup_checks.py \
                 tests/test_celery_app.py \
                 tests/test_validators.py \
                 tests/test_rbac_errors.py \
                 tests/test_audit_service.py \
                 -v --tb=short 2>/dev/null || \
          pytest tests/test_startup_checks.py tests/test_validators.py -v --tb=short

  integration-test:
    name: Integration tests (MySQL + live app)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: shifthandover_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptestroot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: "mysql+pymysql://testuser:testpass@127.0.0.1:3306/shifthandover_test"
      FLASK_SECRET_KEY: "ci-test-secret-key"
      SECRETS_MASTER_KEY: "ci-test-master-key-32chars-pad!"
      SSO_ENCRYPTION_KEY: "ci-test-sso-key-32characters!!"
      FLASK_ENV: testing
      CELERY_BROKER_URL: "memory://"
      CELERY_RESULT_BACKEND: "cache+memory://"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -u root -ptestroot --silent; do
            echo "Waiting for MySQL..."; sleep 2
          done
      - name: Run Flask DB migrations
        run: flask db upgrade
      - name: Seed test users
        run: |
          python - <<'EOF'
          from app import create_app
          from models.models import db, User, Account, Team
          from werkzeug.security import generate_password_hash
          import secrets
          app = create_app()
          with app.app_context():
              db.create_all()
              if not Account.query.first():
                  acc = Account(name='Test Account', is_active=True)
                  db.session.add(acc)
                  db.session.flush()
                  team = Team(name='Test Team', account_id=acc.id, is_active=True)
                  db.session.add(team)
                  db.session.flush()
                  admin = User(username='superadmin',
                               password_hash=generate_password_hash('admin123'),
                               role='super_admin', is_active=True,
                               session_token=secrets.token_hex(32))
                  db.session.add(admin)
                  db.session.commit()
                  print('Test data seeded.')
          EOF
      - name: Start Flask app in background
        run: |
          python app.py &
          echo $! > /tmp/flask.pid
          sleep 8
          curl -sf http://localhost:5000/health || (cat /tmp/flask.log; exit 1)
        env:
          FLASK_APP: app.py
      - name: Run integration tests
        run: |
          python3 tests/run_tests.py \
            --url http://localhost:5000 \
            --user superadmin \
            --password admin123 \
            --verbose || true
          pytest tests/test_application.py -v --tb=short || true
      - name: Stop Flask app
        if: always()
        run: kill $(cat /tmp/flask.pid) || true

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install pip-audit bandit
      - name: Dependency CVE scan
        run: pip-audit --requirement requirements.txt
      - name: Bandit SAST (report all)
        run: bandit -r . -x tests/,migrations/,archive/ --severity-level medium -f json -o bandit-report.json || true
      - name: Bandit SAST (block on high severity)
        run: bandit -r . -x tests/,migrations/,archive/ --severity-level high
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

  secret-detection:
    name: Secret detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, unit-test, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t shifthandover:${{ github.sha }} .
      - name: Log in to GitHub Container Registry
        if: ${{ env.GHCR_PUSH == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        if: ${{ env.GHCR_PUSH == 'true' }}
        run: |
          docker tag shifthandover:${{ github.sha }} ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker tag shifthandover:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [lint, unit-test, security]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/shifthandover-staging
            git pull origin develop
            docker-compose -f docker-compose.prod.yml up -d --build
            docker system prune -f --volumes=false
        continue-on-error: true
