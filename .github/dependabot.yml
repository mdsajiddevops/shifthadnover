version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major-updates:
        update-types: [major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
